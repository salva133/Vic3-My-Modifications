l_english:
# Corleone
  corleone.1.tt: "New York Daily News"
  corleone.1.dd: "Notorious Black Hand Leader Found Dead"
  corleone.1.ff: "#lore #italic Little Italy, New York City - #!In a shocking turn of events, the feared and influential leader of the Black Hand extortion racket, Don Fanucci, was found dead late last night. The incident occurred in the heart of Little Italy, on the corner of Mott and Hester Streets, sending waves of both relief and anxiety through the local immigrant community.\n\nResidents within earshot reported several gunshots shortly after sundown, though the streets were unusually quiet at the time. Fanucci's body was discovered slumped in a doorway, with multiple gunshot wounds to the chest and head.\n\nPolice have yet to identify any suspects, but given Fanucci's extensive list of enemies, officials expect this case to prove difficult to solve. The local Sicilian-American community, which has been plagued by Fanucci's criminal dealings, remains tight-lipped.\n\nWhile the death of Fanucci is welcomed by many victims of his extortion, authorities are concerned this could spark a violent power struggle for control over his rackets in the neighborhood.\n\nThe murder of Don Fanucci adds to the growing unrest in New York's underworld, where tensions between rival gangs and criminal organizations are said to be nearing a boiling point."
  corleone.1.a: "Close"

  corleone.2.tt: "New York Daily News"
  corleone.2.dd: "Underworld Feud Leaves Siegel's Rivals Dead in Shootout"
  corleone.2.ff: "#lore #italic New York City - #!Two prominent rivals of notorious gangster Benjamin 'Bugsy' Siegel were shot dead in a violent confrontation last night. The ambush signals the diminishing opposition to Siegel's control over the East Side, as he consolidates his power in the city's underworld.\n\n#bold New Gang Offers Protection in Little Italy, Replacing Fanucci's Reign of Terror#!\n\n#italic New York City#! - A new gang has emerged in Little Italy, providing protection to local business owners under more favorable conditions than the infamous Don Fanucci. Residents report that the gang's less aggressive approach has brought a sense of security and calm to the neighborhood, a stark contrast to the extortionist rule of Fanucci."
  corleone.2.a: "Close"

  corleone.3.tt: "New York Daily News"
  corleone.3.dd: "[SCOPE.sCharacter('ruler_scope').GetLastName] Signs Securities Exchange Act to Regulate Wall Street Practices"
  corleone.3.ff: "#lore #italic New York City - #![SCOPE.sCharacter('ruler_scope').GetPrimaryRoleTitle] [SCOPE.sCharacter('ruler_scope').GetFullName] signed the Securities Exchange Act into law yesterday, marking a historic effort to regulate stock market practices following the 1929 crash. The act establishes the Securities and Exchange Commission (SEC) to oversee financial markets and prevent fraudulent activities. Wall Street brokers and financial institutions brace for the sweeping changes to their operations.\n\n#bold Police Report Alleged Gathering of Queens and Brooklyn Crime Bosses#!\n\n#italic Queens, New York City - #!According to police reports, several of the most powerful gangsters in Queens and Brooklyn are believed to have met recently in a secretive gathering in Queens. Authorities are monitoring the situation closely, fearing that the meeting could signify a shift in criminal power dynamics. The identities of those involved remain unclear, but law enforcement is on high alert in both boroughs."
  corleone.3.a: "Close"

  corleone.9.tt: "New York Daily News"
  corleone.9.dd: "Infamous Mafia Don [SCOPE.sCharacter('vito_corleone_scope').GetLastName] Dies Peacefully in His Garden"
  corleone.9.ff: "#italic Long Island, New York#! - [SCOPE.sCharacter('vito_corleone_scope').GetFullName], the infamous head of one of New York's most powerful Mafia families, passed away peacefully yesterday afternoon. Corleone, who had retired from public life in recent years, was found in his garden by family members. Despite his long history of criminal influence, Corleone's death marks the end of an era in organized crime. No foul play is suspected. Rumour has it that his son [SCOPE.sCharacter('michael_corleone_scope').GetFirstName] will continue to run the business."
  corleone.9.a: "Close"

# Stoker
  stoker.1.tt: "A journey, like any other"
  stoker.1.dd: "Off to England."
  stoker.1.ff: "#lore On July 6th we finished taking in cargo, silver sand and boxes of earth. At noon set sail; east wind, fresh. Crew, five hands...two mates, cook, and myself (captain).\n\n#italic  - Captain's Log of the Dmitry#!"
  stoker.1.a: "Fair winds and following seas!"

  stoker.2.tt: "A schooner, driven ashore"
  stoker.2.dd: "An unexpected end."
  stoker.2.ff: "#lore August 4, still fog, which the sunrise cannot pierce; I know there is something aboard, and still I dare not speak. The men are beyond fear, working stolidly and patiently, with minds made up to the worst. We are past the Straits of Dover, and I feel ever more dread as we draw near to England. God grant that we may never see land! I am at the end of my tether. I can hardly write; I can hardly think, but I know that unless I act soon, I may be too late. The crew of the Dmitry are dead or gone, I alone am left to manage the ship.\n\nGod help us!\n\n#italic  - Captain's Log, last record of the Dmitry#!"
  stoker.2.a: "Rabies, obviously. Case closed."

# Lovecraft
  hp_lovecraft.1.tt: "Author has success with horror story"
  hp_lovecraft.1.dd: "[SCOPE.sCharacter('hp_scope').GetFullName] has had success in a niche magazine with the terrifyingly gruesome story\n'The Call of Cthulu'."
  hp_lovecraft.1.ff: "#lore 'The Call of Cthulhu' ranks among the best of weird fiction tales, blending a haunting sense of cosmic dread with the notion of incomprehensible beings from beyond. This story of ancient evils awakening from the depths of time serves as a grim reminder of mankind's fragile place in an infinite universe.\n\n#italic - from Weird Tales, February 1928 issue#!"
  hp_lovecraft.1.a: "Close"

  hp_lovecraft.2.tt: "Author has success with horror story"
  hp_lovecraft.2.dd: "[SCOPE.sCharacter('hp_scope').GetFullName] has had success in a niche magazine with the terrifyingly gruesome story\n'Cthulus Ruf'."
  hp_lovecraft.2.ff: "#lore 'Cthulus Ruf' ranks among the best of weird fiction tales, blending a haunting sense of cosmic dread with the notion of incomprehensible beings from beyond. This story of ancient evils awakening from the depths of time serves as a grim reminder of mankind's fragile place in an infinite universe.\n\n#italic - from Der Orchideengarten, February 1928 issue#!"
  hp_lovecraft.2.a: "Close"

  hp_lovecraft.3.tt: "Only nine years"
  hp_lovecraft.3.dd: "[SCOPE.sCharacter('hp_scope').GetFullName] died after only nine years. [SCOPE.sCharacter('hp_scope').GetLastName] was diagnosed with bowel cancer, which was recognised and treated too late."
  hp_lovecraft.3.ff: "#lore 'I am practically dead, eternally ill. It is hard to have to die alone.'\n\n#italic - [SCOPE.sCharacter('hp_scope').GetFullName]"
  hp_lovecraft.3.a: "Close"

  hp_lovecraft.4.tt: "Boston painter's canvases unsettle the public"
  hp_lovecraft.4.dd: "[SCOPE.sCharacter('pickman_scope').GetFullName], a painter of the North End, has shown a series of canvases so grotesquely lifelike that the gallery shuttered within the week. Scholars from Miskatonic University in Arkham have quietly enquired after the collection."
  hp_lovecraft.4.ff: "#lore 'Pickman's Model' belongs to the finest of weird fiction. What froze the blood was not the deviltry of the subjects but the photographic, almost clinical fidelity with which they were set down — as though the artist had not imagined his ghouls at all, but painted them from life.\n\n#italic - from Weird Tales, October 1927 issue#!"
  hp_lovecraft.4.a: "Let Miskatonic University take the canvases"
  hp_lovecraft.4.b: "The painter has vanished — seal the studio"

  miskatonic_acquisition_tt: "Miskatonic University acquires the canvases — a quiet prestige and the gratitude of the $ig_intelligentsia$"

  milei.1.tt: "A Pamphlet Circulates in [ROOT.GetCountry.GetCapital.GetCityHubName]"
  milei.1.dd: "An unknown firebrand rails against the state, the tax collector, and the entire political class."
  milei.1.ff: "#lore 'We are facing one of the biggest economic disasters in our history and radical action is essential. Inflation is nothing more than a tax on the poorest. We will drastically downsize the state to end this evil. The state is not an engine of prosperity, but a machine of waste. We will reform it so that it serves and not dominates. The freedom of the individual is the highest good. Our reforms will be based on an unshakeable belief in the free market. We will create a society where everyone has the chance to get ahead through hard work and personal responsibility. [ROOT.GetCountry.GetNameNoFlag] will reposition itself as a partner of the free world and not as a vassal of ideological projects.'\n\n#italic - lurid anarcho-libertarian pamphlet#!"
  milei.1.a: "Let the man preach."

# Heads or Tails (BioShock Infinite Reference)
  heads_or_tails.1.tt: "An Encounter of the Constant Kind"
  heads_or_tails.1.dd: "The Grand Exhibition is currently taking place in [ROOT.GetCountry.GetCapital.GetCityHubName]. [SCOPE.sCharacter('heads_or_tails_character').GetLastName] is walking past an unassuming stall when he is approached by the couple standing behind it."
  heads_or_tails.1.ff: "A Gentleman: 'Heads?'\nA Lady: 'Or tails?'\n\n[SCOPE.sCharacter('heads_or_tails_character').GetFullName] reacts with surprise, completely taken aback by the unusual question the two of them are asking him.\n\n[SCOPE.sCharacter('heads_or_tails_character').GetLastName]: '...what?'\nThe man tosses a coin to him, and [SCOPE.sCharacter('heads_or_tails_character').GetLastName] catches it.\n\nA Gentleman: 'Heads?'\nA Lady: 'Or tails?'\n\n[SCOPE.sCharacter('heads_or_tails_character').GetLastName]: 'Erm...'"
  heads_or_tails.1.a:  "Heads"
  heads_or_tails.1.b:  "Tails"
  heads_or_tails.2.tt: "Flip Coin"
  heads_or_tails.2.dd: "The small coin flies through the air and comes to rest with a clatter on the round porcelain of her plate.\n\n#bold Heads#!."
  heads_or_tails.2.ff: "A Gentleman: 'Told you', he says, with a hint of disappointment in his voice.\n\nShe hums briefly, as if to confirm it, and adds another chalk line to the half of the board that is titled 'Heads'.\n\nA Gentleman: 'I never find that as satisfying as I'd imagined.'\n\nWith an elegant movement, she brings her hand to his face, and her fingertip gently touches the lower edge of his clean-shaven chin, before lifting his face upwards.\n\nA Lady: 'Chin up. There's always next time.'\n\nA Gentleman: 'I suppose there is.'"
  heads_or_tails.2.a:  "Well, that was awkward"

# Anarchist Balkanisation
  anarchist_balkanisation.1.tt: "The Centre Cannot Hold"
  anarchist_balkanisation.1.dd: "Our doctrine has reached its inevitable conclusion. In [SCOPE.sState('breakaway_state').GetName], the radicals have proclaimed a new commune, refusing all ties to a government they consider as obsolete as the kings before it. There is no army left obedient enough to be sent against them, no decree binding enough to rein them in."
  anarchist_balkanisation.1.ff: "#lore 'The State, in its dying breath, shall give birth to a thousand free associations of free people. Such is the destiny of mankind.'\n\n#italic — pamphlet circulated in the markets of [SCOPE.sState('breakaway_state').GetCityHubName] in the days before the proclamation#!"
  anarchist_balkanisation.1.a:  "It was always going to come to this."
  anarchist_balkanisation.1.b:  "We will bring them back to heel."

# Enact the Act
  enact_the_act.1.tt: "The Act"
  enact_the_act.1.dd: "Emergency Powers Bill Reaches the Floor"
  enact_the_act.1.ff: "#lore #italic The Capital - #!The chamber is full. Galleries packed, doors barred, the press benches three rows deep. On the table before [SCOPE.sCharacter('ruler_scope').GetFullName] lies a single bound dossier — the Bill commonly known as #bold The Act#!.\n\nIn plain language, it transfers the powers of the legislature to the office of [SCOPE.sCharacter('ruler_scope').GetPrimaryRoleTitle] for the duration of the present crisis, and for so long thereafter as the [SCOPE.sCharacter('ruler_scope').GetPrimaryRoleTitle] judges the crisis to persist. Its drafters call it a stabilisation measure. Its critics, where they still speak, call it the end of the Republic.\n\nThe order paper allows no amendments. There will be no second reading. The vote, when it comes, will be a formality — the question is only whether [SCOPE.sCharacter('ruler_scope').GetLastName] signs.\n\n#italic A clerk clears his throat. The Speaker turns toward the rostrum. The room waits.#!"
  enact_the_act.1.a: "Sign #bold The Act#! into law."
  enact_the_act.1.b: "Adjourn. The Republic stands — for now."

# Baltic Dissolution Event
  baltic_dissolution.1.tt: "The Hour of Separation"
  baltic_dissolution.1.dd: "#italic [ROOT.GetCountry.GetCapital.GetCityHubName], [TimeKeeper.GetCurrentDate.GetString] - #!\n\n#bold THE BALTIC DUCHY DISSOLVES — THREE PEOPLES RECLAIM THEIR NAMES#!\n\nThe Ministry of the Interior has ceased to function. The garrison commanders of the Duchy have sent word that they will not fire upon their own peoples. The nationalists were right about one thing: a state built on the suppression of three distinct nations cannot survive the century that gave those nations a vocabulary.\n\nLithuania, Latvia, Estonia — each has a capital, a flag, and an expectation. The only question remaining is in which republic your hand shall guide what comes next."
  baltic_dissolution.1.ff: "#lore #italic 'Three peoples. Three flags. One brief, embarrassing decade as a Duchy.'#!\n\n#italic — anonymous editorial, date and publication unknown#!"
  baltic_dissolution.1.a: "Guide the Lithuanian Republic."
  baltic_dissolution.1.b: "Guide the Latvian Republic."
  baltic_dissolution.1.c: "Guide the Estonian Republic."

# Australian Flavour — transportation of radicals to an Australian subject
  australian_flavour.1.tt: "Transportation Beyond the Seas"
  australian_flavour.1.dd: "#italic [ROOT.GetCountry.GetCapital.GetCityHubName], [TimeKeeper.GetCurrentDate.GetString] - #!\n\n[SCOPE.sState('radical_state').GetName] is no longer governed so much as endured. More than half its people are counted as radicals, and the loudest of them speak the King's own English — agitators who quote our liberties back at us as they tear at the order that granted them.\n\nThe Home Office proposes the old remedy in modern dress: condemn the most troublesome of them as #bold convicts#! and put them aboard the transports bound for [SCOPE.sCountry('destination_country').GetName]. In [SCOPE.sState('destination_state').GetName] there is land enough, and labour wanting, and an ocean between us. Half of the worst pop would be sentenced and shipped; the rest would be left to consider their position."
  australian_flavour.1.ff: "#lore #italic 'A malcontent in the Antipodes is a settler. A malcontent in the home counties is a revolution waiting on a date.'#!\n\n#italic — minute attributed to an under-secretary at the Home Office#!"
  australian_flavour.1.a: "Sentence them as convicts. Let the Antipodes have them."
  australian_flavour.1.b: "We do not exile our own. Let them stew at home."

  australian_flavour.2.tt: "New Hands for [SCOPE.sState('destination_state').GetName]"
  australian_flavour.2.dd: "#italic [SCOPE.sState('destination_state').GetCityHubName], [TimeKeeper.GetCurrentDate.GetString] - #!\n\nThe convict transports from [SCOPE.sCountry('deporting_country').GetName] have made landfall. Where the manifests promised radicals and firebrands, the gangways disgorge tired families clutching what they could carry — convicts with little appetite left for revolution and every reason to begin again.\n\nThey are ours now, in name and in tongue. [SCOPE.sState('destination_state').GetName] gains their backs and their grievances alike."
  australian_flavour.2.ff: "#lore #italic 'They arrived as a problem solved elsewhere. Whether they remain one is now our affair.'#!"
  australian_flavour.2.a: "Put them to work."
