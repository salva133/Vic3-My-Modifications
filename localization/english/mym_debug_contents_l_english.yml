# .7 Journal Entry Spawner
  mym_debug.7.tt: "$mym_debug.pre.tt$ Journal Entry Spawner"
  mym_debug.7.dd: "Force-add any My Modifications journal entry, skipping its usual requirements."
  mym_debug.7.ff: "#lore The journal writes itself tonight. No questions asked.#!"
  mym_debug.7.aa: "Back"
  mym_debug.7.a: "Add #bold $je_gangs_of_new_york$#!"
  mym_debug.7.b: "Add #bold $je_mym_baltic_dissolution$#!"
  mym_debug.7.c: "Add #bold $je_mym_global_religion_tracker$#!"

# .8 Misc Debug Functions
  mym_debug.8.tt: "$mym_debug.pre.tt$ Misc. Debug Functions"
  mym_debug.8.dd: "For ad-hoc testing"
  mym_debug.8.ff: "#lore Create options here if you need to, and for christ sake, clean up afterwards. We do not need any log bloating."
  mym_debug.8.aa: "Back"
