l_english:

# Military Regency
  gov_regency_mym_military: "Military Regency"
  gov_regency_mym_military_desc: "A [concept_government_type] where the throne is vacant and authority has fallen to the leader of the $ig_variant_armed_forces$, who rules as [Concept('concept_ruler','$RULER_TITLE_MYM_LORD_COMMANDER$')] on behalf of a monarch unable to take the throne. The military serves as both guardian and steward of the crown, lending the regime its discipline and its swords.\n\n$TRANSFER_OF_POWER_NAME_DESC$"

# Noble Regency
  gov_regency_mym_noble: "Noble Regency"
  gov_regency_mym_noble_desc: "A [concept_government_type] where the throne is vacant and authority has fallen to the foremost magnate of the realm, who rules as [Concept('concept_ruler','$RULER_TITLE_MYM_LORD_REGENT$')] on behalf of a monarch unable to take the throne. The aristocracy lends the regime the legitimacy of ancient title and the weight of its estates.\n\n$TRANSFER_OF_POWER_NAME_DESC$"

# Swiss Confederation flavour government types
  gov_swiss_diet: "The Tagsatzung"
  gov_swiss_diet_desc: "A loose confederation of sovereign cantons. Its presiding canton — the #italic Vorort#! — rotates annually between Zürich, Bern and Lucerne, and at its head stands the [Concept('concept_ruler','$RULER_TITLE_LANDAMMANN$')] of Switzerland, spokesman of the assembled estates rather than head of state.\n\n$TRANSFER_OF_POWER_NAME_DESC$"

  gov_swiss_federation: "Swiss Confederation"
  gov_swiss_federation_desc: "A federal state under the Constitution of 1848. Executive authority rests with the seven-member #italic Bundesrat#!, whose chairmanship rotates annually; the [Concept('concept_ruler','$RULER_TITLE_FEDERAL_PRESIDENT$')] is primus inter pares, not head of state.\n\n$TRANSFER_OF_POWER_NAME_DESC$"

  gov_swiss_federation_dictator: "Plenipotentiary Regime"
  gov_swiss_federation_dictator_desc: "The Federal Council governs by emergency decree under #italic Vollmachten#! granted outside the ordinary constitutional process. Parliament and people are bypassed; the [Concept('concept_ruler','$RULER_TITLE_PLENIPOTENTIARY$')] rules the Confederation by fiat.\n\n$TRANSFER_OF_POWER_NAME_DESC$"

# Vice-Monarchies
  gov_mym_viceroyalty: "Viceroyalty"
  gov_mym_viceroyalty_desc: "A [concept_government_type] where a kingdom is governed as a [concept_puppet] of a foreign power. Its [Concept('concept_ruler','$RULER_TITLE_MYM_VICEROY$')] or [Concept('concept_ruler','$RULER_TITLE_MYM_VICEREINE$')] wears the trappings of royalty, but reigns in the name — and at the pleasure — of the [concept_overlord].\n\n$TRANSFER_OF_POWER_NAME_DESC$"

  gov_mym_vice_duchy: "Vice-Duchy"
  gov_mym_vice_duchy_desc: "A [concept_government_type] where a duchy is governed as a [concept_puppet] of a foreign power. Its [Concept('concept_ruler','$RULER_TITLE_MYM_VICE_DUKE$')] or [Concept('concept_ruler','$RULER_TITLE_MYM_VICE_DUCHESS$')] holds court at home, but the ducal seal is set to no document the [concept_overlord] would not countersign.\n\n$TRANSFER_OF_POWER_NAME_DESC$"

  gov_mym_vice_principality: "Vice-Principality"
  gov_mym_vice_principality_desc: "A [concept_government_type] where a principality is governed as a [concept_puppet] of a foreign power. Its [Concept('concept_ruler','$RULER_TITLE_MYM_VICE_PRINCE$')] or [Concept('concept_ruler','$RULER_TITLE_MYM_VICE_PRINCESS$')] rules by hereditary right, yet every act of state defers to the will of the [concept_overlord].\n\n$TRANSFER_OF_POWER_NAME_DESC$"

  gov_mym_vice_regency: "Vice-Regency"
  gov_mym_vice_regency_desc: "A [concept_government_type] where the throne of a [concept_puppet] monarchy stands vacant. A [Concept('concept_ruler','$RULER_TITLE_MYM_VICE_REGENT$')] carries on the government in the name of a monarch unable to take the throne — and, above them, in the name of the [concept_overlord], at whose pleasure the regency is suffered to continue.\n\n$TRANSFER_OF_POWER_NAME_DESC$"

# Patrician Republic (renamed from vanilla "Oligarchic Republic" — Brazilian República Velha)
  gov_brazil_oligarchic_republic_presidential: "Patrician Republic"
  gov_brazil_oligarchic_republic_presidential_desc: "A [concept_government_type] where the [concept_country] is ruled by a [Concept('concept_ruler','$RULER_TITLE_PRESIDENT$')] [Concept('concept_election','$concept_elected$')] by a narrow patriciate of landed notables, whose estates and ancient names furnish the republic its electors and its officeholders alike.\n\n$TRANSFER_OF_POWER_NAME_DESC$"

