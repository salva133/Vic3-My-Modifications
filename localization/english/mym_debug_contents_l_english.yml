l_english:

### DEBUG MENU
  mym_debug.pre.tt: "#blue My Modifications#!"

# .1 Main menu
  mym_debug.1.tt: "$mym_debug.pre.tt$: Debug Menu"
  mym_debug.1.dd: "Access various debugging tools and submenus for rapid testing and modification of game states. Each option opens a specialized debug function."
  mym_debug.1.ff: "#lore Behind every system lies a hidden panel—where the rules of the world are rewritten with a single choice."
  mym_debug.1.aa: "Close"
  mym_debug.1.a: "$mym_debug.2.tt$\n$mym_debug.2.dd$"
  mym_debug.1.b: "$mym_debug.3.tt$\n$mym_debug.3.dd$"
  mym_debug.1.c: "$mym_debug.4.tt$\n$mym_debug.4.dd$"
  mym_debug.1.d: "$mym_debug.5.tt$\n$mym_debug.5.dd$"
  mym_debug.1.e: "$mym_debug.6.tt$\n$mym_debug.6.dd$"
  mym_debug.1.f: "Heim ins Reich! — annex every European country whose primary culture is North German."
  mym_debug.1.g: "Stuff the ground! — scatter 100 levels each of Rubber Plantation, Oil Rig and Sulfur Mine across random owned states. Over-cap levels stay until demolished, then they're gone."
  mym_debug.1.h: "$mym_debug.7.tt$\n$mym_debug.7.dd$"

# .2 Leader Ideology Changer
  mym_debug.2.tt: "$mym_debug.pre.tt$ Leader Ideology Changer"
  mym_debug.2.dd: "Providing ideological options"
  mym_debug.2.ff: "#lore Only applies ideologies that exist in the game.\nIf an ideology can't be applied, it doesn't exist in the current game."
  mym_debug.2.aa: "Back"
  mym_debug.2.a: "Together, we will restore order and national glory!"
  mym_debug.2.b: "Comrades, arise!"
  mym_debug.2.c: "Break your chains, friend!"
  mym_debug.2.d: "Embrace your freedom!"
  mym_debug.2.e: "Trust noone!"
  mym_debug.2.f: "Scramble every [Concept('concept_politician','Politicians')] $concept_ideology$"
  mym_debug.2.g: "Set Secret Police IG name dynamically (#green Global#!)"

# .3 Game Breaker
  mym_debug.3.tt: "$mym_debug.pre.tt$ Game Breaker"
  mym_debug.3.dd: "Providing debugging options"
  mym_debug.3.ff: "#lore Some gamebreaking stuff here, have fun #red if you dare!#!"
  mym_debug.3.aa: "Back"
  mym_debug.3.a: "All countries get era 5 tech"
  mym_debug.3.b: "All countries become independent"
  mym_debug.3.d: "Give me all the Tech, du Dreck!"
  mym_debug.3.e: "Purge the bottom two percent"
  mym_debug.3.e_tt: "Captures every #bold unemployed#! pop that sits in both the bottom-2% [concept_literacy] band and the bottom-2% [concept_sol] band of the population — and kills them. The two bands intersect, so at most 2% of the population dies. Deaths are dealt per state and culture, so employed pops of the same culture may catch some of the volley. Available once every #bold 50 years#!."

# .4 Character Spawn
  mym_debug.4.tt: "$mym_debug.pre.tt$ Character Spawn"
  mym_debug.4.dd: "Choose your Agitator"
  mym_debug.4.ff: "#lore Selecting an option will spawn an Agitator with the corresponding Ideology. If such an Agitator already exists, he will be made the ruler."
  mym_debug.4.aa: "Back"
  mym_debug.4.b: "Nation and blood above all!!"
  mym_debug.4.c: "Tear down the oppressors!"
  mym_debug.4.d: "No masters, no servants!"
  mym_debug.4.e: "Strength and tradition shall prevail!"
  mym_debug.4.f: "Reason and progress above all!"
  mym_debug.4.g: "Accelerate into the future!"
  mym_debug.4.h: "Absolute Power corrupts absolutely"

# .5 Movement Attraction
  mym_debug.5.tt: "$mym_debug.pre.tt$ Movement Attraction"
  mym_debug.5.dd: "Spawn a one-year decaying attraction modifier for the chosen movement in every owned state."
  mym_debug.5.ff: "#lore Nudge the masses — one decaying year of enthusiasm, on every state you hold.#!"
  mym_debug.5.aa: "Back"
  mym_debug.5.a: "Anarchist"
  mym_debug.5.b: "Communist"
  mym_debug.5.c: "Corporatist"
  mym_debug.5.d: "Cultural Majority"
  mym_debug.5.e: "Cultural Minority"
  mym_debug.5.g: "Fascist"
  mym_debug.5.h: "Feminist"
  mym_debug.5.i: "Labor"
  mym_debug.5.j: "Land Reform"
  mym_debug.5.k: "Liberal"
  mym_debug.5.l: "Modernizer"
  mym_debug.5.m: "Nihilist"
  mym_debug.5.n: "Positivist"
  mym_debug.5.o: "Pro-Slavery"
  mym_debug.5.p: "Radical"
  mym_debug.5.q: "Reactionary"
  mym_debug.5.r: "Religious Majority"
  mym_debug.5.s: "Royalist (Absolutist)"
  mym_debug.5.t: "Royalist (Constitutional)"
  mym_debug.5.u: "Socialist"
  mym_debug.5.v: "Utilitarian"

# .6 Journal Entry Spawner
  mym_debug.6.tt: "$mym_debug.pre.tt$ Journal Entry Spawner"
  mym_debug.6.dd: "Force-add any My Modifications journal entry, skipping its usual requirements."
  mym_debug.6.ff: "#lore The journal writes itself tonight. No questions asked.#!"
  mym_debug.6.aa: "Back"
  mym_debug.6.a: "Add #bold $je_gangs_of_new_york$#!"
  mym_debug.6.b: "Add #bold $je_mym_baltic_dissolution$#!"

# .7 Misc Debug Functions
  mym_debug.7.tt: "$mym_debug.pre.tt$ Misc. Debug Functions"
  mym_debug.7.dd: "For ad-hoc testing"
  mym_debug.7.ff: "#lore Create options here if you need to, and for christ sake, clean up afterwards. We do not need any log bloating."
  mym_debug.7.aa: "Back"
