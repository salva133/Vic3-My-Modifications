l_english:

### DEBUG MENU
  mym_debug.pre.tt: "#blue My Modifications#!"

# .1 Main menu
  mym_debug.1.tt: "$mym_debug.pre.tt$: Debug Menu"
  mym_debug.1.dd: "Access various debugging tools and submenus for rapid testing and modification of game states. Each option opens a specialized debug function."
  mym_debug.1.ff: "#lore Behind every system lies a hidden panel—where the rules of the world are rewritten with a single choice."
  mym_debug.1.aa: "Close"
  mym_debug.1.a: "$mym_debug.2.tt$\n$mym_debug.2.dd$"
  mym_debug.1.b: "$mym_debug.8.tt$\n$mym_debug.8.dd$"

# .2 Cheats submenu
  mym_debug.2.tt: "$mym_debug.pre.tt$ Cheats"
  mym_debug.2.dd: "All the clearly-cheating tools, in one place."
  mym_debug.2.ff: "#lore Conscience optional. The world bends; you do not.#!"
  mym_debug.2.aa: "Back"
  mym_debug.2.a: "$mym_debug.3.tt$\n$mym_debug.3.dd$"
  mym_debug.2.b: "$mym_debug.4.tt$\n$mym_debug.4.dd$"
  mym_debug.2.c: "$mym_debug.5.tt$\n$mym_debug.5.dd$"
  mym_debug.2.d: "$mym_debug.6.tt$\n$mym_debug.6.dd$"
  mym_debug.2.e: "Heim ins Reich! — annex every European country whose primary culture is North German."
  mym_debug.2.f: "Stuff the ground! — scatter 100 levels each of Rubber Plantation, Oil Rig and Sulfur Mine across random owned states. Over-cap levels stay until demolished, then they're gone."
  mym_debug.2.g: "$mym_debug.7.tt$\n$mym_debug.7.dd$"

# .3 Leader Ideology Changer
  mym_debug.3.tt: "$mym_debug.pre.tt$ Leader Ideology Changer"
  mym_debug.3.dd: "Providing ideological options"
  mym_debug.3.ff: "#lore Only applies ideologies that exist in the game.\nIf an ideology can't be applied, it doesn't exist in the current game."
  mym_debug.3.aa: "Back"
  mym_debug.3.a: "Together, we will restore order and national glory!"
  mym_debug.3.b: "Comrades, arise!"
  mym_debug.3.c: "Break your chains, friend!"
  mym_debug.3.d: "Embrace your freedom!"
  mym_debug.3.e: "Trust noone!"
  mym_debug.3.f: "Scramble every [Concept('concept_politician','Politicians')] $concept_ideology$"
  mym_debug.3.g: "Set Secret Police IG name dynamically (#green Global#!)"

# .4 Game Breaker
  mym_debug.4.tt: "$mym_debug.pre.tt$ Game Breaker"
  mym_debug.4.dd: "Providing debugging options"
  mym_debug.4.ff: "#lore Some gamebreaking stuff here, have fun #red if you dare!#!"
  mym_debug.4.aa: "Back"
  mym_debug.4.a: "All countries get era 5 tech"
  mym_debug.4.b: "All countries become independent"
  mym_debug.4.d: "Give me all the Tech, du Dreck!"

# .5 Character Spawn
  mym_debug.5.tt: "$mym_debug.pre.tt$ Character Spawn"
  mym_debug.5.dd: "Choose your Agitator"
  mym_debug.5.ff: "#lore Selecting an option will spawn an Agitator with the corresponding Ideology. If such an Agitator already exists, he will be made the ruler."
  mym_debug.5.aa: "Back"
  mym_debug.5.b: "Nation and blood above all!!"
  mym_debug.5.c: "Tear down the oppressors!"
  mym_debug.5.d: "No masters, no servants!"
  mym_debug.5.e: "Strength and tradition shall prevail!"
  mym_debug.5.f: "Reason and progress above all!"
  mym_debug.5.g: "Accelerate into the future!"
  mym_debug.5.h: "Absolute Power corrupts absolutely"

# .6 Movement Attraction
  mym_debug.6.tt: "$mym_debug.pre.tt$ Movement Attraction"
  mym_debug.6.dd: "Spawn a one-year decaying attraction modifier for the chosen movement in every owned state."
  mym_debug.6.ff: "#lore Nudge the masses — one decaying year of enthusiasm, on every state you hold.#!"
  mym_debug.6.aa: "Back"
