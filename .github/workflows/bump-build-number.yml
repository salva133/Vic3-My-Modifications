name: Bump Build Number

on:
  pull_request:
    types: [closed]
    branches:
      - master

jobs:
  bump-build-number:
    if: github.event.pull_request.merged == true
    uses: salva133/My-Workflows/.github/workflows/bump-build-number.yml@7229769e5562f12fc2a33062b309e3d396eaf0ef
    with:
      pr_number: ${{ github.event.pull_request.number }}
