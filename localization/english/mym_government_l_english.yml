  RULER_TITLE_MYM_VICE_DUCHESS: "Vice-Duchess"
  RULER_TITLE_MYM_VICE_PRINCE: "Vice-Prince"
  RULER_TITLE_MYM_VICE_PRINCESS: "Vice-Princess"
  RULER_TITLE_MYM_VICE_REGENT: "Vice-Regent"
