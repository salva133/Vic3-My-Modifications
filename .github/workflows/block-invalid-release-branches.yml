name: Block Invalid Release Branches

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches:
      - master

jobs:
  block-invalid-release-pr:
    uses: salva133/My-Workflows/.github/workflows/block-invalid-release-branches.yml@13b252b367ac2423dd2a5c2676675590b8f6c8a3
    with:
      head_ref: ${{ github.head_ref }}
