# JE Gangs of New York
  je_gangs_of_new_york: "Gangs of [Concept('concept_state','$STATE_NEW_YORK$')]"
  je_gangs_of_new_york_status: "Maintain control over the entire state of New York as criminal networks rise and fall."
  je_gangs_of_new_york_reason: "The roaring twenties have unleashed a wave of organized crime and underground power struggles. Whoever controls New York shapes the fate of its streets and the nation's criminal underworld."

# JE Baltic Dissolution (UBD only)
  je_mym_baltic_dissolution: "The Fracture of the Duchy"
  je_mym_baltic_dissolution_reason: "The Duchy holds the homelands of peoples who have now discovered the word #italic nation#!. The doctrine of $nationalism$ makes the present borders untenable."
  je_mym_baltic_dissolution_status: "Hold homeland states of at least two Baltic peoples — Lithuanian, Latvian, Estonian — and the Duchy will fracture into its constituent nations."
